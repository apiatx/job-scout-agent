kind = "api"
previewPath = "/"
title = "Job Scout Agent"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/"]

[services.development]
run = "cd artifacts/api-server && PORT=8080 npm run dev"

[services.production.run]
args = ["node", "--import", "tsx", "artifacts/api-server/src/index.ts"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
