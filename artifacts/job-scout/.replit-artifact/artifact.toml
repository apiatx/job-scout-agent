kind = "web"
previewPath = "/"
title = "Job Scout Agent"
version = "1.0.0"
id = "artifacts/job-scout"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25906
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/job-scout run dev"

[services.env]
PORT = "25906"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/job-scout", "run", "build"]
publicDir = "artifacts/job-scout/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
