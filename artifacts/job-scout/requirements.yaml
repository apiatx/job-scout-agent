packages:
  "framer-motion": "Smooth page transitions and component animations for a premium feel"
  "date-fns": "Formatting dates in the UI (e.g. for scout run history and job found dates)"
  "lucide-react": "Beautiful consistent iconography across the app"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes without style conflicts"
  "recharts": "For rendering beautiful matching score distribution and activity charts on the dashboard"

images:
  - path: "artifacts/job-scout/public/images/logo.png"
    description: "A minimal, modern geometric logo for an AI Job Scout application. The logo should use a deep indigo and vibrant violet color palette on a transparent background, conveying a sense of smart, automated searching."
    aspect_ratio: "1:1"
  - path: "artifacts/job-scout/public/images/dashboard-bg.png"
    description: "A subtle, dark abstract mesh gradient background with deep indigos, blacks, and soft violet light leaks. It should feel premium, professional, and not distracting, perfect for a dark-mode dashboard."
    aspect_ratio: "16:9"

notes:
  - Using generated Orval hooks from @workspace/api-client-react.
  - Relying on react-query for state management and caching.
  - Dark mode is forced natively via standard Tailwind classes and CSS variables.
